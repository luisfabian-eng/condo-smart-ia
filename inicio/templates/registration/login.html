<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Condo-Smart IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        /* Fondo con el gradiente morado suave que pediste */
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        /* Estilo de la tarjeta blanca moderna */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(5px); /* Efecto de desenfoque de fondo suave */
        }

        /* Título con color morado oscuro */
        .login-title {
            color: #4a148c; /* Morado Oscuro */
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .login-subtitle {
            color: #757575;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        /* Icono de la marca */
        .brand-icon {
            font-size: 2.5rem;
            color: #6200ea; /* Morado Vibrante */
            display: block;
            text-align: center;
            margin-bottom: 1rem;
        }

        .form-control {
    border-radius: 10px;
    padding: 0.75rem 1rem;
    border: 1px solid #e0e0e0;
    background-color: #f8f9fa;
    text-align: center; /* ESTO CENTRA EL TEXTO QUE ESCRIBES */
    width: 100%;       /* ASEGURA QUE OCUPE TODO EL ANCHO DISPONIBLE */
    margin: 0 auto;    /* CENTRA EL ELEMENTO EN SU CONTENEDOR */
}

        .form-control:focus {
            border-color: #7c4dff; /* Morado suave al enfocar */
            box-shadow: 0 0 0 0.2rem rgba(124, 77, 255, 0.25);
            background-color: #fff;
        }

        /* Etiquetas (Labels) en morado */
      .form-label {
    color: #6200ea;
    font-weight: 600;
    font-size: 0.9rem;
    display: block;    /* CAMBIAMOS A BLOCK PARA PODER CENTRAR */
    text-align: center; /* CENTRA EL TEXTO DE LA ETIQUETA */
    margin-bottom: 5px;
}
        /* Botón morado con efecto hover blanco */
        .btn-login {
            background: linear-gradient(45deg, #6200ea, #7c4dff);
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 10px;
            padding: 0.75rem;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: white;
            color: #6200ea; /* Texto morado al pasar el mouse */
            border: 2px solid #6200ea;
            box-shadow: 0 5px 15px rgba(98, 0, 234, 0.3);
        }

        /* Estilo para los mensajes de error de Django */
        .errorlist {
            list-style: none;
            padding: 0;
            color: #d32f2f;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        /* Enlaces secundarios */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #757575;
        }

        .login-footer a {
            color: #6200ea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <i class="bi bi-building-check brand-icon"></i>
        
        <h3 class="login-title">Condo-Smart IA</h3>
        <p class="login-subtitle">Introduce tus credenciales para acceder</p>
        
        <form method="post">
            {% csrf_token %}
            
            {% if form.errors %}
                {{ form.errors }}
            {% endif %}
            
            <div class="mb-3 text-center">
    <label for="{{ form.username.id_for_label }}" class="form-label">Usuario</label>
    {{ form.username }}
</div>

<div class="mb-3 text-center">
    <label for="{{ form.password.id_for_label }}" class="form-label">Contraseña</label>
    {{ form.password }}
</div>
            <button type="submit" class="btn btn-login shadow">
                <i class="bi bi-door-open me-2"></i> Entrar al Dashboard
            </button>
        </form>
        
        <div class="login-footer">
            <p>¿Olvidaste tu contraseña? <a href="#">Recupérala aquí</a></p>
            </div>
    </div>

</body>
</html>
