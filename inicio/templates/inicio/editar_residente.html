<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Residente | Condo-Smart IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .card { border-radius: 15px; border: none; }
        .bg-custom { background-color: #f8f9fa; }
    </style>
</head>
<body class="bg-custom">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg p-4">
                    <div class="card-body">
                        <h3 class="fw-bold mb-4 text-dark">
                            <i class="bi bi-pencil-square text-warning me-2"></i>Editar Residente
                        </h3>
                        <hr>
                        <form method="POST">
                            {% csrf_token %}
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Nombre</label>
                                    <input type="text" name="nombre" class="form-control" value="{{ residente.nombre }}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Apellido</label>
                                    <input type="text" name="apellido" class="form-control" value="{{ residente.apellido }}" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold">Teléfono de contacto</label>
                                <input type="text" name="telefono" class="form-control" value="{{ residente.telefono }}" required>
                            </div>

                            <div class="row mb-4">
                                <div class="col-6">
                                    <label class="form-label small fw-bold">Departamento</label>
                                    <input type="text" name="departamento" class="form-control" value="{{ residente.departamento }}" required>
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-bold">Torre</label>
                                    <select name="torre" class="form-select">
                                        <option value="A" {% if residente.torre == 'A' %}selected{% endif %}>Torre A</option>
                                        <option value="B" {% if residente.torre == 'B' %}selected{% endif %}>Torre B</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold">Tipo</label>
                                <select name="tipo" class="form-select">
                                    <option value="propietario" {% if residente.tipo == 'propietario' %}selected{% endif %}>Propietario</option>
                                    <option value="arrendatario" {% if residente.tipo == 'arrendatario' %}selected{% endif %}>Arrendatario</option>
                                </select>
                            </div>

                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary w-100 fw-bold">Guardar Cambios</button>
                                <a href="{% url 'residentes' %}" class="btn btn-light w-100 fw-bold">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
