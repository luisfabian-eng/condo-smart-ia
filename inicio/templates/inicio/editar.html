<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Gastos | Condo-Smart IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-vibrant: #0D6EFD;
            --success-vibrant: #198754;
            --danger-vibrant: #DC3545;
            --bg-light: #F4F7FC;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-light); 
        }

        .card-stats {
            border-radius: 20px;
            border: none;
            transition: transform 0.2s;
            height: 100%; /* Asegura que todas las tarjetas tengan la misma altura */
        }

        .card-stats:hover {
            transform: translateY(-5px);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            flex-shrink: 0; /* Evita que el icono se deforme en móviles */
        }

        .form-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .btn-save {
            border-radius: 12px;
            padding: 12px 25px;
            background-color: var(--primary-vibrant);
            border: none;
        }

        /* Ajuste para que los inputs no se vean pegados en móvil */
        @media (max-width: 768px) {
            .container { margin-top: 20px !important; }
            .btn-save, .btn-light { width: 100%; } /* Botones de ancho completo en móvil */
            .d-flex.gap-2 { flex-direction: column; }
        }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-5 mb-5">
        <div class="row g-3 mb-5">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card card-stats shadow-sm p-3 bg-white">
                    <div class="d-flex align-items-center">
                        <div class="icon-box bg-success bg-opacity-10 me-3">
                            <i class="bi bi-cash-stack text-success fs-4"></i>
                        </div>
                        <div>
                            <h6 class="text-muted small fw-bold mb-0 text-uppercase">Total Recaudado</h6>
                            <h3 class="fw-bold mb-0 text-success">${{ total_recaudado|default:"0" }}</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="card card-stats shadow-sm p-3 bg-white">
                    <div class="d-flex align-items-center">
                        <div class="icon-box bg-danger bg-opacity-10 me-3">
                            <i class="bi bi-cart-dash text-danger fs-4"></i>
                        </div>
                        <div>
                            <h6 class="text-muted small fw-bold mb-0 text-uppercase">Total Gastado</h6>
                            <h3 class="fw-bold mb-0 text-danger">${{ total_gastado|default:"0" }}</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="card card-stats shadow-sm p-3 text-white" style="background: linear-gradient(45deg, #1e3a8a, #0D6EFD);">
                    <div class="d-flex align-items-center">
                        <div class="icon-box bg-white bg-opacity-20 me-3">
                            <i class="bi bi-bank text-white fs-4"></i>
                        </div>
                        <div>
                            <h6 class="text-white-50 small fw-bold mb-0 text-uppercase">Saldo Disponible</h6>
                            <h3 class="fw-bold mb-0 text-white">${{ saldo_disponible|default:"0" }}</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-8">
                <div class="card form-card shadow p-4">
                    <div class="d-flex align-items-center mb-4">
                        <i class="bi bi-pencil-square text-primary fs-3 me-3"></i>
                        <h3 class="fw-bold mb-0">Editar Registro de Gasto</h3>
                    </div>
                    
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show border-0 shadow-sm small" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="row g-3 mb-3">
                            <div class="col-12 col-md-8">
                                <label class="form-label small fw-bold text-muted">Título del Gasto</label>
                                <input type="text" name="titulo" class="form-control form-control-lg border-0 bg-light" value="{{ registro.titulo }}" placeholder="Ej: Reparación Ascensor" required>
                            </div>
                            <div class="col-12 col-md-4">
                                <label class="form-label small fw-bold text-muted">Monto ($)</label>
                                <input type="number" name="monto" class="form-control form-control-lg border-0 bg-light" value="{{ registro.monto|stringformat:'d' }}" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-12 col-md-6">
                                <label class="form-label small fw-bold text-muted">Categoría</label>
                                <select name="categoria" class="form-select form-select-lg border-0 bg-light">
                                    <option value="servicios" {% if registro.categoria == 'servicios' %}selected{% endif %}>Servicios Básicos</option>
                                    <option value="mantenimiento" {% if registro.categoria == 'mantenimiento' %}selected{% endif %}>Mantenimiento</option>
                                    <option value="sueldos" {% if registro.categoria == 'sueldos' %}selected{% endif %}>Sueldos</option>
                                    <option value="seguridad" {% if registro.categoria == 'seguridad' %}selected{% endif %}>Seguridad</option>
                                    <option value="otros" {% if registro.categoria == 'otros' %}selected{% endif %}>Otros</option>
                                </select>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label small fw-bold text-muted">Fecha del Gasto</label>
                                <input type="date" name="fecha" class="form-control form-control-lg border-0 bg-light" value="{{ registro.fecha_gasto|date:'Y-m-d' }}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">Descripción Detallada</label>
                            <textarea name="descripcion" class="form-control border-0 bg-light" rows="3">{{ registro.descripcion }}</textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-save text-white fw-bold">
                                <i class="bi bi-check-circle me-2"></i>Guardar cambios
                            </button>
                            <a href="{% url 'home' %}" class="btn btn-light px-4 fw-bold d-flex align-items-center justify-content-center">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Manejo seguro del saldo para evitar errores de sintaxis
        const saldo = Number("{{ saldo_disponible|default:0 }}");
        if (saldo < 50000) {
            console.warn("IA Condo-Smart: Alerta de saldo bajo para próximos gastos.");
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
